<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loki</title>
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1a0f;
            --surface: #151f15;
            --border: #1e2e1e;
            --green-accent: #4a9a4a;
            --gold: #c9a84c;
            --gold-dim: #c9a84c44;
            --text: #d4e8d4;
            --text-dim: #6a8a6a;
            --user-bg: #0f2a1a;
            --user-border: #c9a84c33;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, #1a3a1a33, transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, #c9a84c0a, transparent);
            pointer-events: none;
        }

        .app {
            width: 100%;
            max-width: 640px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 28px 32px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            border: 1px solid var(--gold-dim);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--gold);
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--gold);
        }

        .brand-tag {
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 2px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--green-accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .time-bar {
            padding: 8px 32px;
            font-size: 0.7rem;
            color: var(--gold);
            opacity: 0.6;
            letter-spacing: 1px;
            min-height: 32px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: none;
        }

        .chat::-webkit-scrollbar { display: none; }

        .msg {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 82%;
            animation: appear 0.2s ease;
        }

        @keyframes appear {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.loki { align-self: flex-start; }
        .msg.user { align-self: flex-end; }

        .msg-label {
            font-size: 0.62rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            padding: 0 2px;
        }

        .msg.user .msg-label {
            color: var(--gold);
            text-align: right;
        }

        .msg-bubble {
            padding: 11px 15px;
            font-size: 0.875rem;
            line-height: 1.6;
            font-weight: 300;
        }

        .msg.loki .msg-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 2px solid var(--green-accent);
            color: var(--text);
            border-radius: 0 6px 6px 6px;
        }

        .msg.user .msg-bubble {
            background: var(--user-bg);
            border: 1px solid var(--user-border);
            border-right: 2px solid var(--gold);
            color: #e8d4a0;
            border-radius: 6px 0 6px 6px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            height: 16px;
        }

        .typing-dots span {
            width: 4px;
            height: 4px;
            background: var(--green-accent);
            border-radius: 50%;
            animation: dot 1.2s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        .input-area {
            padding: 20px 32px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 11px 16px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 300;
            outline: none;
            transition: border-color 0.15s;
        }

        input::placeholder { color: var(--text-dim); }
        input:focus { border-color: var(--green-accent); }

        .send-btn {
            width: 40px;
            height: 40px;
            background: none;
            border: 1px solid var(--green-accent);
            border-radius: 4px;
            color: var(--green-accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover { background: var(--green-accent); color: var(--bg); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .send-btn:disabled:hover { background: none; color: var(--green-accent); }
        .send-btn svg { width: 16px; height: 16px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="brand">
                <div class="brand-icon">𓂀</div>
                <div>
                    <div class="brand-name">LOKI</div>
                    <div class="brand-tag">God of Time · AI</div>
                </div>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                Online
            </div>
        </div>

        <div class="time-bar" id="timeBar"></div>

        <div class="chat" id="chat"></div>

        <div class="input-area">
            <input
                type="text"
                id="input"
                placeholder="Message Loki..."
                onkeydown="if(event.key==='Enter') send()"
                autocomplete="off"
            />
            <button class="send-btn" id="sendBtn" onclick="send()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const userId = "user_akku";
        let lastTimestamp = new Date().toISOString();

        function addMessage(text, role, timestamp = null) {
            const chat = document.getElementById("chat");
            if (timestamp) {
                const existing = document.querySelector(`[data-ts="${timestamp}"]`);
                if (existing) return;
            }
            const msg = document.createElement("div");
            msg.classList.add("msg", role);
            if (timestamp) msg.setAttribute("data-ts", timestamp);
            msg.innerHTML = `
                <div class="msg-label">${role === 'user' ? 'You' : 'Loki'}</div>
                <div class="msg-bubble">${text}</div>
            `;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            if (timestamp && timestamp > lastTimestamp) lastTimestamp = timestamp;
            else if (!timestamp) {
                const now = new Date().toISOString();
                if (now > lastTimestamp) lastTimestamp = now;
            }
        }

        function showTyping() {
            const chat = document.getElementById("chat");
            const t = document.createElement("div");
            t.id = "typing";
            t.classList.add("msg", "loki");
            t.innerHTML = `
                <div class="msg-label">Loki</div>
                <div class="msg-bubble">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            `;
            chat.appendChild(t);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const input = document.getElementById("input");
            const btn = document.getElementById("sendBtn");
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, "user");
            input.value = "";
            btn.disabled = true;
            showTyping();

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: userId, message })
                });
                const data = await res.json();
                document.getElementById("typing")?.remove();
                addMessage(data.reply, "loki");
                if (data.time_context) {
                    document.getElementById("timeBar").textContent = "⏳ " + data.time_context;
                }
            } catch (err) {
                document.getElementById("typing")?.remove();
                addMessage("The Bifrost is down. Try again.", "loki");
            }

            btn.disabled = false;
            input.focus();
        }

        async function poll() {
            try {
                const res = await fetch(`/poll?user_id=${userId}&after=${encodeURIComponent(lastTimestamp)}`);
                const data = await res.json();
                if (data.messages?.length > 0) {
                    data.messages.forEach(msg => {
                        const existing = document.querySelector(`[data-ts="${msg.timestamp}"]`);
                        if (!existing) addMessage(msg.message, "loki", msg.timestamp);
                    });
                }
            } catch (e) {}
        }

        window.onload = () => {
            addMessage("I am Loki. God of time, mischief, and your personal AI. What do you seek?", "loki");
            setInterval(poll, 5000);
        };
    </script>
</body>
</html>
